name: ci

on:
  push:
    branches: [main, ci]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-image:
    runs-on: self-hosted
    steps:
      - name: Set current date as env variable
        run: echo "NOW=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV
      - name: Fix for bad os check
        run: echo "RUNNER_OS=Linux" >> $GITHUB_ENV
      - name: Login to Forgejo Registry
        uses: https://cremin.dev/actions/podman-login@v1
        with:
          registry: cremin.dev
          username: ${{ github.actor }}
          password: ${{ secrets.FORGEJO_REGISTRY_TOKEN }}
      - name: Check out repository
        uses: https://cremin.dev/actions/checkout@v4
      # Build the slim runtime image (this is what gets deployed). `layers: true`
      # keeps the local layer cache between runs on the self-hosted runner, so
      # unchanged steps (e.g. pnpm install) are reused. Building runtime also
      # builds the builder stage it copies from, priming the cache for the
      # builder image below.
      - name: Build runtime image
        uses: https://cremin.dev/actions/buildah-build@v2
        with:
          containerfiles: ./Containerfile
          context: ./
          oci: true
          layers: true
          extra-args: --target=runtime
          image: hostr
          tags: ${{ github.ref == 'refs/heads/main' && 'latest ' || '' }}${{ github.sha }}
      - name: Push runtime image
        uses: https://cremin.dev/actions/push-to-registry@v2
        with:
          registry: cremin.dev/jonathan
          username: ${{ github.actor }}
          password: ${{ secrets.FORGEJO_REGISTRY_TOKEN }}
          image: hostr
          tags: ${{ github.ref == 'refs/heads/main' && 'latest ' || '' }}${{ github.sha }}
      # Build the builder stage for the test-image job (same runner). The runtime
      # build above already built this stage, so it's a cache hit. Kept in local
      # container storage only — never pushed.
      - name: Build test image
        uses: https://cremin.dev/actions/buildah-build@v2
        with:
          containerfiles: ./Containerfile
          context: ./
          oci: true
          layers: true
          extra-args: --target=builder
          image: hostr
          tags: ${{ github.sha }}-builder

  test-image:
    runs-on: self-hosted
    needs: build-image
    timeout-minutes: 15
    env:
      RUN_ID: ${{ github.run_id }}
    steps:
      - name: Check out repository
        uses: https://cremin.dev/actions/checkout@v4

      - name: Clean up any leftover containers and network from previous runs
        run: |
          podman rm -f hostr-test-app-$RUN_ID database-$RUN_ID redis-$RUN_ID || true
          podman network inspect hostr-test-$RUN_ID -f '{{range .Containers}}{{.Name}} {{end}}' 2>/dev/null \
            | xargs -r podman network disconnect hostr-test-$RUN_ID 2>/dev/null || true
          podman network rm hostr-test-$RUN_ID 2>/dev/null || true

      - name: Create test network
        run: podman network create hostr-test-$RUN_ID

      - name: Start services
        run: |
          podman run -d --name database-$RUN_ID --network hostr-test-$RUN_ID \
            --network-alias database \
            -e POSTGRES_PASSWORD=hostr \
            -e POSTGRES_USER=hostr \
            -e POSTGRES_DB=hostr \
            docker.io/library/postgres:18-alpine

          podman run -d --name redis-$RUN_ID --network hostr-test-$RUN_ID \
            --network-alias redis \
            docker.io/library/redis:8-alpine

      - name: Wait for postgres to be ready
        run: |
          for i in $(seq 1 30); do
            podman exec database-$RUN_ID pg_isready -U hostr && break
            echo "Waiting for postgres... ($i/30)"
            sleep 2
          done
          podman exec database-$RUN_ID pg_isready -U hostr

      - name: Test image
        run: |
          podman run \
            --name hostr-test-app-$RUN_ID \
            --network hostr-test-$RUN_ID \
            --env-file ./.forgejo/workflows/.env \
            --stop-timeout 10 \
            --pull never \
            localhost/hostr:${{ github.sha }}-builder \
            sh -c "mkdir -p /tmp/uploads && pnpm run init && pnpm test"

      - name: Cleanup
        if: ${{ always() }}
        run: |
          podman rm -f hostr-test-app-$RUN_ID database-$RUN_ID redis-$RUN_ID || true
          podman network rm hostr-test-$RUN_ID 2>/dev/null || true
          podman rmi localhost/hostr:${{ github.sha }}-builder 2>/dev/null || true
