name: ci

on:
  push:
    branches: [main, ci]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-image:
    runs-on: self-hosted
    steps:
      - name: Set current date as env variable
        run: echo "NOW=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV
      - name: Fix for bad os check
        run: echo "RUNNER_OS=Linux" >> $GITHUB_ENV
      - name: Login to Docker Hub
        uses: https://cremin.dev/actions/docker-login@v3
        with:
          registry: cremin.dev
          username: ${{ github.actor }}
          password: ${{ secrets.FORGEJO_REGISTRY_TOKEN }}
      - name: Check out repository
        uses: https://cremin.dev/actions/checkout@v4
      - name: Set up Docker Buildx
        uses: https://cremin.dev/actions/docker-setup-buildx@v3
      # Push the slim runtime image (this is what gets deployed). Layer cache
      # is shared via the registry so unchanged steps (e.g. pnpm install) are
      # reused across runs. mode=max also caches the builder stage below.
      - name: Build and push runtime image
        uses: https://cremin.dev/actions/docker-build-push@v6
        with:
          file: ./Containerfile
          context: ./
          target: runtime
          tags: ${{ github.ref == 'refs/heads/main' && 'cremin.dev/jonathan/hostr:latest,' || '' }}cremin.dev/jonathan/hostr:${{ github.sha }}
          push: true
          cache-from: type=registry,ref=cremin.dev/jonathan/hostr:buildcache
          cache-to: type=registry,ref=cremin.dev/jonathan/hostr:buildcache,mode=max
      # Load the builder stage locally for the test-image job (same runner).
      # The runtime build above already built this stage, so it's a cache hit.
      - name: Build and load test image
        uses: https://cremin.dev/actions/docker-build-push@v6
        with:
          file: ./Containerfile
          context: ./
          target: builder
          tags: cremin.dev/jonathan/hostr:${{ github.sha }}-builder
          load: true
          cache-from: type=registry,ref=cremin.dev/jonathan/hostr:buildcache

  test-image:
    runs-on: self-hosted
    needs: build-image
    timeout-minutes: 15
    env:
      RUN_ID: ${{ github.run_id }}
    steps:
      - name: Check out repository
        uses: https://cremin.dev/actions/checkout@v4

      - name: Clean up any leftover containers and network from previous runs
        run: |
          docker rm -f hostr-test-app-$RUN_ID database-$RUN_ID redis-$RUN_ID || true
          docker network inspect hostr-test-$RUN_ID -f '{{range .Containers}}{{.Name}} {{end}}' 2>/dev/null \
            | xargs -r docker disconnect hostr-test-$RUN_ID 2>/dev/null || true
          docker network rm hostr-test-$RUN_ID 2>/dev/null || true

      - name: Create test network
        run: docker network create hostr-test-$RUN_ID

      - name: Start services
        run: |
          docker run -d --name database-$RUN_ID --network hostr-test-$RUN_ID \
            --network-alias database \
            -e POSTGRES_PASSWORD=hostr \
            -e POSTGRES_USER=hostr \
            -e POSTGRES_DB=hostr \
            postgres:18-alpine

          docker run -d --name redis-$RUN_ID --network hostr-test-$RUN_ID \
            --network-alias redis \
            redis:8-alpine

      - name: Wait for postgres to be ready
        run: |
          for i in $(seq 1 30); do
            docker exec database-$RUN_ID pg_isready -U hostr && break
            echo "Waiting for postgres... ($i/30)"
            sleep 2
          done
          docker exec database-$RUN_ID pg_isready -U hostr

      - name: Test image
        run: |
          docker run \
            --name hostr-test-app-$RUN_ID \
            --network hostr-test-$RUN_ID \
            --env-file ./.forgejo/workflows/.env \
            --stop-timeout 10 \
            --pull never \
            cremin.dev/jonathan/hostr:${{ github.sha }}-builder \
            sh -c "mkdir -p /tmp/uploads && pnpm run init && pnpm test"

      - name: Cleanup
        if: ${{ always() }}
        run: |
          docker rm -f hostr-test-app-$RUN_ID database-$RUN_ID redis-$RUN_ID || true
          docker network rm hostr-test-$RUN_ID 2>/dev/null || true
          docker rmi cremin.dev/jonathan/hostr:${{ github.sha }}-builder 2>/dev/null || true
