name: ci

on:
  push:
    branches: [main, ci]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-image:
    runs-on: self-hosted
    steps:
      - name: Set current date as env variable
        run: echo "NOW=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV
      - name: Fix for bad os check
        run: echo "RUNNER_OS=Linux" >> $GITHUB_ENV
      - name: Login to Docker Hub
        uses: https://cremin.dev/actions/docker-login@v3
        with:
          registry: cremin.dev
          username: ${{ github.actor }}
          password: ${{ secrets.FORGEJO_REGISTRY_TOKEN }}
      - name: Check out repository
        uses: https://cremin.dev/actions/checkout@v4
      - name: Set up Docker Buildx
        uses: https://cremin.dev/actions/docker-setup-buildx@v3
      - name: Build and push
        uses: https://cremin.dev/actions/docker-build-push@v6
        with:
          file: ./Containerfile
          context: ./
          tags: ${{ github.ref == 'refs/heads/main' && 'cremin.dev/jonathan/hostr:latest,' || '' }}cremin.dev/jonathan/hostr:${{ github.sha }}
          push: true

  test-image:
    runs-on: self-hosted
    needs: build-image
    steps:
      - name: Check out repository
        uses: https://cremin.dev/actions/checkout@v4

      - name: Clean up any leftover containers and network from previous runs
        run: |
          docker rm -f hostr-test-app database redis || true
          docker network inspect hostr-test -f '{{range .Containers}}{{.Name}} {{end}}' 2>/dev/null \
            | xargs -r docker disconnect hostr-test 2>/dev/null || true
          docker network rm hostr-test 2>/dev/null || true

      - name: Create test network
        run: docker network create hostr-test

      - name: Start services
        run: |
          docker run -d --name database --network hostr-test \
            -e POSTGRES_PASSWORD=hostr \
            -e POSTGRES_USER=hostr \
            -e POSTGRES_DB=hostr \
            postgres:18-alpine

          docker run -d --name redis --network hostr-test \
            redis:8-alpine

      - name: Wait for postgres to be ready
        run: |
          for i in $(seq 1 30); do
            docker exec database pg_isready -U hostr && break
            echo "Waiting for postgres... ($i/30)"
            sleep 2
          done
          docker exec database pg_isready -U hostr

      - name: Test image
        run: |
          docker run \
            --name hostr-test-app \
            --network hostr-test \
            --env-file ./.forgejo/workflows/.env \
            cremin.dev/jonathan/hostr:${{ github.sha }} \
            sh -c "mkdir -p /tmp/uploads && pnpm run init && pnpm test"

      - name: Cleanup
        if: ${{ always() }}
        run: |
          docker rm -f hostr-test-app database redis || true
          docker network rm hostr-test 2>/dev/null || true
